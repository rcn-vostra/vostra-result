name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for NuGet Trusted Publishing (OIDC) — no stored API key
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-build

      # Version comes from the tag (single source of truth) — without this, pack uses the
      # hardcoded Directory.Build.props version and the push below can't find the tagged file.
      - name: Pack
        run: dotnet pack -c Release -p:ContinuousIntegrationBuild=true -p:Version=${{ steps.version.outputs.VERSION }} -o ./artifacts

      # Mint a short-lived (≈1h) NuGet API key via OIDC, just before pushing.
      # Requires a Trusted Publishing policy on nuget.org for this repo + workflow file (release.yml).
      - name: NuGet login (OIDC → temporary API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: rcn   # nuget.org username (profile name), NOT your email

      - name: Push Core
        run: |
          V=${{ steps.version.outputs.VERSION }}
          dotnet nuget push "./artifacts/Vostra.Result.${V}.nupkg" \
            --api-key ${{ steps.login.outputs.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
          dotnet nuget push "./artifacts/Vostra.Result.${V}.snupkg" \
            --api-key ${{ steps.login.outputs.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Push AspNetCore
        run: |
          V=${{ steps.version.outputs.VERSION }}
          dotnet nuget push "./artifacts/Vostra.Result.AspNetCore.${V}.nupkg" \
            --api-key ${{ steps.login.outputs.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
          dotnet nuget push "./artifacts/Vostra.Result.AspNetCore.${V}.snupkg" \
            --api-key ${{ steps.login.outputs.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Push Testing
        run: |
          V=${{ steps.version.outputs.VERSION }}
          dotnet nuget push "./artifacts/Vostra.Result.Testing.${V}.nupkg" \
            --api-key ${{ steps.login.outputs.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
          dotnet nuget push "./artifacts/Vostra.Result.Testing.${V}.snupkg" \
            --api-key ${{ steps.login.outputs.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Push AspNetCore.Testing
        run: |
          V=${{ steps.version.outputs.VERSION }}
          dotnet nuget push "./artifacts/Vostra.Result.AspNetCore.Testing.${V}.nupkg" \
            --api-key ${{ steps.login.outputs.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
          dotnet nuget push "./artifacts/Vostra.Result.AspNetCore.Testing.${V}.snupkg" \
            --api-key ${{ steps.login.outputs.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
